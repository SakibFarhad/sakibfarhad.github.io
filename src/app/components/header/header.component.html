<header>
  <nav class="navbar navbar-expand-lg border-bottom bg-body-tertiary shadow-sm sticky-top py-2">
    <div class="container">
      <a class="navbar-brand fw-semibold text-body" routerLink="/" aria-label="Home">
        {{ site.shortName }}<span class="text-primary d-none d-sm-inline"> · {{ site.role }}</span>
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#siteNav"
        aria-controls="siteNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
        >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="siteNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-1">
          <li class="nav-item">
            <a
              class="nav-link rounded px-3"
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link rounded px-3" routerLink="/about" routerLinkActive="active">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link rounded px-3" routerLink="/projects" routerLinkActive="active">Highlights</a>
            </li>
            <li class="nav-item">
              <a class="nav-link rounded px-3" routerLink="/contact" routerLinkActive="active">Contact</a>
            </li>
          </ul>
          <div class="d-flex flex-wrap align-items-center gap-2 ms-lg-2 social-toolbar" aria-label="Theme and profiles">
            <button
              type="button"
              class="btn btn-outline-secondary btn-sm rounded-pill theme-toggle"
              (click)="theme.toggle()"
              [attr.aria-pressed]="theme.isDark()"
              [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
              [title]="theme.isDark() ? 'Light mode' : 'Dark mode'"
              >
              @if (!theme.isDark()) {
                <i class="fas fa-moon" aria-hidden="true"></i>
              }
              @if (theme.isDark()) {
                <i class="fas fa-sun" aria-hidden="true"></i>
              }
            </button>
            @for (link of socialLinks; track link) {
              <a
                [href]="link.href"
                class="social-btn btn btn-sm btn-outline-secondary border-0"
                target="_blank"
                rel="noopener noreferrer"
                [attr.aria-label]="link.label"
                >
                <i [ngClass]="link.icon" aria-hidden="true"></i>
              </a>
            }
          </div>
        </div>
      </div>
    </nav>
  </header>
